name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: macos-26
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - name: Cache SwiftPM dependencies
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/Library/org.swift.swiftpm
          key: swiftpm-${{ runner.os }}-${{ hashFiles('Package.resolved') }}
          restore-keys: swiftpm-${{ runner.os }}-

      - name: Swift version
        run: swift --version

      - name: Run tests
        run: swift test

      - name: Motion reference tooling tests
        run: |
          python3 -m py_compile \
            scripts/motion_reference/audit_motion_coverage.py \
            scripts/motion_reference/audit_kg_motion_readiness.py \
            scripts/motion_reference/report_motion_pipeline_gaps.py \
            scripts/motion_reference/test_audit_motion_coverage.py \
            scripts/motion_reference/test_report_motion_pipeline_gaps.py
          python3 scripts/motion_reference/test_report_motion_pipeline_gaps.py

      - name: Motion coverage inventory
        run: python3 scripts/motion_reference/audit_motion_coverage.py

      - name: KG motion readiness audit
        run: python3 scripts/motion_reference/audit_kg_motion_readiness.py --summary-only

      - name: Motion reference gap report
        if: always()
        run: python3 scripts/motion_reference/report_motion_pipeline_gaps.py

      - name: Upload motion reference gap report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: motion-reference-gap-report
          path: |
            dist/motion-reference/gap-report.json
            dist/motion-reference/gap-report.md
          if-no-files-found: warn

      - name: Upload motion accuracy scorecard
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: motion-accuracy-scorecard
          path: dist/motion-accuracy/scorecard.json
          if-no-files-found: ignore
