name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: macos-26
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Cache SwiftPM dependencies
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/Library/org.swift.swiftpm
          key: swiftpm-${{ runner.os }}-${{ hashFiles('Package.resolved') }}
          restore-keys: swiftpm-${{ runner.os }}-

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Swift version
        run: swift --version

      # Single source of truth: CI runs the same gate script used locally and
      # by the release preflight. The motion audit auto-detects that dist/
      # source-chain artifacts are absent on a fresh clone and runs its
      # non-strict tier; the strict provenance tier runs on release machines.
      - name: Run monorepo gates
        run: scripts/run_monorepo_gates.sh

      - name: Upload motion reference gap report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: motion-reference-gap-report
          path: |
            dist/motion-reference/gap-report.json
            dist/motion-reference/gap-report.md
          if-no-files-found: warn

      - name: Upload motion accuracy scorecard
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: motion-accuracy-scorecard
          path: dist/motion-accuracy/scorecard.json
          if-no-files-found: ignore
